version: "3.8"

services:
  api:
    build: .
    container_name: phobert-api
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  streamlit:
    build: .
    container_name: phobert-streamlit
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
    depends_on:
      - api
    restart: unless-stopped